image: ubuntu:20.04

stages:
  - install
  - build
  - deploy

cache:
  paths:
    - client/node_modules/
    - server/node_modules/

before_script:
  # Install Node.js and npm
  - apt-get update
  - apt-get install -y curl
  - curl -fsSL https://deb.nodesource.com/setup_14.x | bash -
  - apt-get install -y nodejs
  - node -v
  - npm -v

  # Install dependencies for client and server
  - cd client && npm install && cd ..
  - cd server && npm install && cd ..

install:
  stage: install
  script:
    - npm run install:all

build:
  stage: build
  script:
    - npm run build:all
  artifacts:
    paths:
      - client/build

pages:
  stage: deploy
  script:
    - mv client/build public
  artifacts:
    paths:
      - public
  only:
    - main